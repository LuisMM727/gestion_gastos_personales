[tool.black]
# Configuración de Black para formato de código
line-length = 100
target-version = ['py310', 'py311', 'py312']
include = '\.pyi?$'
extend-exclude = '''
/(
  # Directorios
  \.git
  | \.venv
  | venv
  | env
  | __pycache__
  | \.eggs
  | \.mypy_cache
  | \.pytest_cache
  | \.tox
  | migrations
  | build
  | dist
)/
'''

[tool.isort]
# Configuración de isort para organizar importaciones
profile = "black"
line_length = 100
multi_line_mode = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
skip_glob = [
    "*/migrations/*",
    "*/.venv/*",
    "*/venv/*",
    "*/env/*",
    "*/__pycache__/*"
]

[tool.pylint]
# Configuración de Pylint
max-line-length = 100
load-plugins = []
exclude-dirs = [
    "migrations",
    ".venv",
    "venv",
    "env",
    "__pycache__"
]

[tool.pytest.ini_options]
# Configuración de pytest
testpaths = ["members/tests.py"]
python_files = "test_*.py"
